{% extends 'base.html' %}

{% block title %}Cambio de Contraseña - FAMA{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <form method="POST" class="card shadow border-0 p-4">
            <h4 class="fw-bold mb-3"><i class="bi bi-shield-lock text-warning me-2"></i>Cambio de Contraseña</h4>
            <p class="text-secondary">Por seguridad, debes establecer una contraseña personal para acceder al sistema.</p>
            
            <input type="password" name="nueva_password" class="form-control mb-2" placeholder="Nueva contraseña" required>
            <input type="password" name="confirmar_password" class="form-control mb-3" placeholder="Confirmar contraseña" required>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold">Guardar y Acceder</button>
        </form>
    </div>
</div>
{% endblock %}
