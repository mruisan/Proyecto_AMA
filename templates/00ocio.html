    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container d-flex justify-content-between align-items-center">
        <a href="index.html"><img src="img/logo3.png" alt="Logo" style="height:60px;"></a>
        <nav class="d-flex align-items-center">
            <ul class="nav">
                <li class="nav-item"><a class="nav-link" href="habitacional.html">Vivienda</a></li>
                <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                <li class="nav-item"><a class="nav-link" href="mercado.html">Mercado</a></li>
                <li class="nav-item"><a class="nav-link" href="ocio.html">Ocio</a></li>
            </ul>
            <button class="btn btn-outline-light ms-3" data-bs-toggle="modal" data-bs-target="#modalAuth">Login</button>
        </nav>
    </div>
</header>

<main class="container py-5">
    <h2 class="section-title text-center">Eventos, Ocio y Cultura</h2>
    
    <div class="floating-form shadow-lg" style="border-top: 5px solid #0077c0;">
        <h4 class="mb-4">Crear un Evento</h4>
        <form>
            <div class="mb-3">
                <label class="form-label">Nombre del Evento</label>
                <input type="text" class="form-control" placeholder="Ej: Torneo de Pádel, Visita Cultural..." required>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Fecha</label>
                    <input type="date" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tipo de Actividad</label>
                    <select class="form-select">
                        <option>Deportiva</option>
                        <option>Cultural / Visita</option>
                        <option>Social / Recreativa</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Lugar de encuentro</label>
                <input type="text" class="form-control" placeholder="Ej: Pabellón de la Base, Centro Ciudad...">
            </div>
            <div class="mb-3">
                <label class="form-label">Detalles adicionales</label>
                <textarea class="form-control" rows="3" placeholder="Horarios, material necesario, inscripciones..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Organizar Evento</button>
        </form>
    </div>
</main>
