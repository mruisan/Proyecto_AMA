<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armada - Mercado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container d-flex justify-content-between align-items-center">
        <a href="index.html"><img src="img/logo3.png" alt="Logo" style="height:60px;"></a>
        <nav class="d-flex align-items-center">
            <ul class="nav">
                <li class="nav-item"><a class="nav-link" href="habitacional.html">Vivienda</a></li>
                <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                <li class="nav-item"><a class="nav-link" href="mercado.html">Mercado</a></li>
                <li class="nav-item"><a class="nav-link" href="ocio.html">Ocio</a></li>
            </ul>
            <button class="btn btn-outline-light ms-3" data-bs-toggle="modal" data-bs-target="#modalAuth">Login</button>
        </nav>
    </div>
</header>

<main class="container py-5">
    <h2 class="section-title text-center">Mercado de Compraventa</h2>
    
    <div class="floating-form">
        <h4 class="mb-4 text-success">Vender un Artículo</h4>
        <form>
            <div class="mb-3">
                <label class="form-label">Nombre del producto</label>
                <input type="text" class="form-control" placeholder="¿Qué vendes o intercambias?" required>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">Precio (€)</label>
                    <input type="number" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-8">
                    <label class="form-label">Categoría</label>
                    <select class="form-select">
                        <option>Vehículos y Electrónica</option>
                        <option>Mobiliario</option>
                        <option>Merchandising Oficial</option>
                        <option>Uniformes / Equipo</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado del producto</label>
                <textarea class="form-control" rows="3" placeholder="Describe el estado, antigüedad..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Foto (Opcional)</label>
                <input type="file" class="form-control">
            </div>
            <button type="submit" class="btn btn-success w-100 text-white py-2">Publicar en Mercado</button>
        </form>
    </div>
</main>

<footer><div class="container">&copy; 2026 Armada - Todos los derechos reservados</div></footer>

<div class="modal fade" id="modalAuth" tabindex="-1"> ... (copiar del anterior) ... </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
