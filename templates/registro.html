{% extends 'base.html' %}

{% block title %}Registro de Usuario - FAMA{% endblock %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-dark text-white text-center py-4">
                <h4 class="mb-0 fw-bold text-uppercase"><i class="bi bi-person-plus-fill me-2 text-primary"></i>Alta de Usuario</h4>
                <p class="mb-0 text-muted small mt-1">Regístrese para acceder al ecosistema FAMA</p>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('auth.registro') }}" method="POST">
                    
                    <input type="hidden" name="rol" value="militar">
                    
                    <div class="mb-3">
                        <label for="usuario" class="form-label text-secondary fw-semibold">Usuario</label>
                        <input type="text" class="form-control" id="usuario" name="username" required placeholder="Ej: 12345678A">
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="nombre" class="form-label text-secondary fw-semibold">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ej: Juan">
                        </div>
                        <div class="col-md-6">
                            <label for="apellidos" class="form-label text-secondary fw-semibold">Apellidos</label>
                            <input type="text" class="form-control" id="apellidos" name="apellidos" required placeholder="Ej: Pérez García">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="correo" class="form-label text-secondary fw-semibold">Correo Electrónico</label>
                        <input type="email" class="form-control" id="correo" name="correo" required placeholder="juan.perez@armada.mde.es">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-secondary fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 text-uppercase mb-3">Crear Cuenta</button>
                    
                    <div class="text-center small">
                        <span class="text-secondary">¿Ya tienes cuenta?</span> 
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">Inicia Sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
