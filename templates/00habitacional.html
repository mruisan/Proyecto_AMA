<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armada - Vivienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container d-flex justify-content-between align-items-center">
        <a href="index.html"><img src="img/logo3.png" alt="Logo" style="height:60px;"></a>
        <nav class="d-flex align-items-center">
            <ul class="nav">
                <li class="nav-item"><a class="nav-link" href="habitacional.html">Vivienda</a></li>
                <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                <li class="nav-item"><a class="nav-link" href="mercado.html">Mercado</a></li>
                <li class="nav-item"><a class="nav-link" href="ocio.html">Ocio</a></li>
            </ul>
            <button class="btn btn-outline-light ms-3" data-bs-toggle="modal" data-bs-target="#modalAuth">Login</button>
        </nav>
    </div>
</header>

<main class="container py-5">
    <h2 class="section-title text-center">Gestión de Vivienda</h2>
    
    <div class="floating-form">
        <h4 class="mb-4">Publicar nuevo anuncio</h4>
        <form>
            <div class="mb-3">
                <label class="form-label">Título del anuncio</label>
                <input type="text" class="form-control" placeholder="Ej: Piso cerca de la Base" required>
            </div>
            <div class="row mb-3">
                <div class="col"><input type="number" class="form-control" placeholder="Precio €"></div>
                <div class="col">
                    <select class="form-select">
                        <option>Vivienda Completa</option>
                        <option>Habitación</option>
                    </select>
                </div>
            </div>
            <textarea class="form-control mb-3" rows="3" placeholder="Descripción detallada..."></textarea>
            <button type="submit" class="btn btn-primary w-100">Publicar Anuncio</button>
        </form>
    </div>
</main>
