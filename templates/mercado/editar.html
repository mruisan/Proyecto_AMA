{% extends 'base.html' %}

{% block title %}Editar Artículo - FAMA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-3">
            <a href="{{ url_for('mercado.listar_material') }}" class="text-decoration-none text-secondary small fw-semibold">
                <i class="bi bi-arrow-left me-1"></i> Volver al listado
            </a>
        </div>

        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-warning text-dark p-4">
                <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>Editar Artículo</h4>
                <p class="mb-0 text-dark-50 small mt-1">Modifica los detalles de tu anuncio publicado por: <strong>{{ session.usuario.usuario }}</strong></p>
            </div>
            
            <div class="card-body p-4">
                <form action="{{ url_for('mercado.editar_articulo', articulo_id=articulo._id) }}" method="POST">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="categoria" class="form-label text-secondary fw-semibold">Categoría</label>
                            <select class="form-select" id="categoria" name="categoria" required>
                                {% for cat in ['Motor', 'Tecnología', 'Deporte', 'Ropa/Uniformidad', 'Hogar', 'Otros'] %}
                                    <option value="{{ cat }}" {% if articulo.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="estado" class="form-label text-secondary fw-semibold">Estado del Producto</label>
                            <select class="form-select" id="estado" name="estado" required>
                                <option value="Nuevo" {% if articulo.estado == 'Nuevo' %}selected{% endif %}>Nuevo / Impecable</option>
                                <option value="Buen Estado" {% if articulo.estado == 'Buen Estado' %}selected{% endif %}>Buen Estado (Usado)</option>
                                <option value="Aceptable" {% if articulo.estado == 'Aceptable' %}selected{% endif %}>Aceptable</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label for="titulo" class="form-label text-secondary fw-semibold">Título del artículo</label>
                            <input type="text" class="form-control" id="titulo" name="titulo" value="{{ articulo.titulo }}" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label for="precio" class="form-label text-secondary fw-semibold">Precio (€)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">€</span>
                                <input type="number" class="form-control" id="precio" name="precio" min="0" value="{{ articulo.precio | int }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label text-secondary fw-semibold">Detalles del anuncio</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="4" required>{{ articulo.descripcion }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label for="contacto" class="form-label text-secondary fw-semibold">Teléfono o Extensión de contacto</label>
                        <input type="text" class="form-control" id="contacto" name="contacto" value="{{ articulo.contacto }}">
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                        <a href="{{ url_for('mercado.listar_material') }}" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-warning text-dark px-5 fw-bold">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
