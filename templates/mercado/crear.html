{% extends 'base.html' %}

{% block title %}Publicar Artículo - AMA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-3">
            <a href="{{ url_for('mercado.listar_material') }}" class="text-decoration-none text-secondary small fw-semibold">
                <i class="bi bi-arrow-left me-1"></i> Volver a la tienda
            </a>
        </div>

        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-info text-white p-4">
                <h4 class="mb-0 fw-bold"><i class="bi bi-bag-plus-fill me-2"></i>Publicar Nuevo Artículo</h4>
                <p class="mb-0 text-white-50 small mt-1">El anuncio se validará bajo el identificador de usuario: <strong>{{ session.usuario.usuario }}</strong></p>
            </div>
            
            <div class="card-body p-4">
                <form action="{{ url_for('mercado.crear_articulo') }}" method="POST">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="categoria" class="form-label text-secondary fw-semibold">Categoría</label>
                            <select class="form-select" id="categoria" name="categoria" required>
                                <option value="Motor" selected>Motor (Coches, Motos, Accesorios)</option>
                                <option value="Tecnología">Tecnología y Electrónica</option>
                                <option value="Deportes/Ocio">Deportes, Caza, Pesca y Ocio</option>
                                <option value="Hogar/Mudanzas">Hogar, Muebles y Mudanzas</option>
                                <option value="Otros">Otros Artículos</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="estado" class="form-label text-secondary fw-semibold">Estado del Producto</label>
                            <select class="form-select" id="estado" name="estado" required>
                                <option value="Nuevo" selected>Nuevo / Impecable</option>
                                <option value="Buen Estado">Buen Estado (Usado)</option>
                                <option value="Aceptable">Aceptable</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label for="titulo" class="form-label text-secondary fw-semibold">¿Qué vendes o buscas?</label>
                            <input type="text" class="form-control" id="titulo" name="titulo" required placeholder="Ej: Bicicleta de montaña / Casco de moto">
                        </div>
                        
                        <div class="col-md-4">
                            <label for="precio" class="form-label text-secondary fw-semibold">Precio (€)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">€</span>
                                <input type="number" class="form-control" id="precio" name="precio" min="0" placeholder="0 = Gratis" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label text-secondary fw-semibold">Detalles del anuncio</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="4" required placeholder="Describe las especificaciones, fallos, si haces envíos o entregas en mano en la base..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="contacto" class="form-label text-secondary fw-semibold">Teléfono o Extensión de contacto</label>
                        <input type="text" class="form-control" id="contacto" name="contacto" placeholder="Ej: Ext. 4321 / WhatsApp 600000000">
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                        <a href="{{ url_for('mercado.listar_material') }}" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-info text-white px-5 fw-bold">Publicar Artículo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
