{% extends 'base.html' %}

{% block title %}Proponer Actividad - AMA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-3">
            <a href="{{ url_for('ocio.listar_planes') }}" class="text-decoration-none text-secondary small fw-semibold">
                <i class="bi bi-arrow-left me-1"></i> Volver a actividades
            </a>
        </div>

        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-warning text-dark p-4">
                <h4 class="mb-0 fw-bold"><i class="bi bi-calendar-event-fill me-2"></i>Proponer Nueva Actividad / Plan</h4>
                <p class="mb-0 text-dark-50 small mt-1">El evento se publicará bajo el nombre de usuario: <strong>{{ session.usuario.usuario }}</strong></p>
            </div>
            
            <div class="card-body p-4">
                <form action="{{ url_for('ocio.crear_plan') }}" method="POST">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="categoria" class="form-label text-secondary fw-semibold">Categoría del Plan</label>
                            <select class="form-select" id="categoria" name="categoria" required>
                                <option value="Deportes" selected>Deportes / Torneos</option>
                                <option value="Cultural">Cultural / Visitas</option>
                                <option value="Gastronomía">Gastronomía / Quedadas</option>
                                <option value="Rutas/Viajes">Rutas / Senderismo / Viajes cortos</option>
                                <option value="Otros">Otros Planes</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="fecha" class="form-label text-secondary fw-semibold">Fecha y Hora exacta</label>
                            <input type="datetime-local" class="form-control" id="fecha" name="fecha" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="lugar" class="form-label text-secondary fw-semibold">Lugar de encuentro</label>
                        <input type="text" class="form-control" id="lugar" name="lugar" required placeholder="Ej: Puerta del polideportivo de la base / Plaza Mayor">
                    </div>

                    <div class="mb-3">
                        <label for="titulo" class="form-label text-secondary fw-semibold">Título de la actividad</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" required placeholder="Ej: Partido de fútbol sala - Dotación contra alumnos">
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label text-secondary fw-semibold">¿En qué consiste el plan?</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="4" required placeholder="Detalla las plazas disponibles, si hay que llevar equipación, precio de entradas si aplica, etc..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="contacto" class="form-label text-secondary fw-semibold">Contacto / Canal de coordinación</label>
                        <input type="text" class="form-control" id="contacto" name="contacto" placeholder="Ej: Grupo de WhatsApp (enlace) / Ext. 5432">
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                        <a href="{{ url_for('ocio.listar_planes') }}" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-warning text-dark px-5 fw-bold">Publicar Actividad</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
